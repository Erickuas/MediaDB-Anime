<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Media DB</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <a class="logo" href="index.html">Media DB</a>
        <nav class="top-nav"></nav>
    </div>
</header>

<main class="content player-page">

<section class="panel player-panel">

    <aside class="player-sidebar">
        <a id="seriesPosterLink" class="player-poster-wrap" href="#">
            <img id="seriesPoster" src="" alt="">
        </a>
        <button type="button" id="seriesTitleBtn" class="series-name-btn">Loading...</button>
        <div id="videoList" class="player-episode-list"></div>
    </aside>

    <div class="player-main">
        <div class="video-wrapper">
            <div class="episode-header">
                <div class="title-controls">
                    <button id="prevButton" class="nav-button">← Previous</button>
                    <div class="title-column">
                        <h2 id="episodeTitle" class="episode-title-clickable">Loading...</h2>
                    </div>
                    <button id="nextButton" class="nav-button">Next →</button>
                </div>

                <div class="header-info">
                    <span id="episodeCounter"></span>
                </div>
            </div>

            <div class="player-video-stage">
                <iframe id="videoPlayer" class="player-video" style="border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <video id="videoPlayerDirect" class="player-video" style="display:none;background:#000" controls playsinline></video>

                <div id="playerFallback" style="display:none">
                    <span>Unable to load video.</span>
                    <a id="externalLink" href="#" target="_blank">Open on Google Drive</a>
                </div>
            </div>

            <div class="language-switcher">
                <label for="languageSelect">Language:</label>
                <select id="languageSelect">
                    <option value="jp">Japanese</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </div>

</section>

</main>

<script src="js/series-db.js"></script>
<script src="js/anilist.js"></script>

<script>
/* =========================
   SAFE ID HANDLING
========================= */
function getSeriesId() {
    const url = new URL(window.location.href);
    return url.searchParams.get("id");
}

const seriesId = getSeriesId();

if (!seriesId) {
    document.body.innerHTML = "<h1 style='padding:20px'>No series id provided</h1>";
    throw new Error("Missing series id");
}

const series = getSeriesById(seriesId);

if (!series) {
    document.body.innerHTML = "<h1 style='padding:20px'>Series not found</h1>";
    throw new Error("Series not found");
}

/* =========================
   DATA
========================= */
const episodes = series?.season?.episodes || [];
const videoIds = series?.season?.videoIds || [];

let activeIndex = 0;
let currentLanguage = "jp";

/* =========================
   ELEMENTS
========================= */
const player = document.getElementById("videoPlayer");
const playerDirect = document.getElementById("videoPlayerDirect");
const seriesPosterLink = document.getElementById("seriesPosterLink");
const seriesPosterEl = document.getElementById("seriesPoster");
const seriesTitleBtn = document.getElementById("seriesTitleBtn");
const episodeTitleEl = document.getElementById("episodeTitle");
const listEl = document.getElementById("videoList");

const displayName = series.subtitle || series.title;
const seasonPageUrl = `${series.seasonPage}?id=${series.id}`;
seriesPosterLink.href = seasonPageUrl;
seriesPosterEl.src = series.cover || "";
seriesPosterEl.alt = displayName;
seriesTitleBtn.textContent = displayName;
const externalLink = document.getElementById("externalLink");
const fallback = document.getElementById("playerFallback");
const languageSelect = document.getElementById("languageSelect");

/* =========================
   BUILD GOOGLE DRIVE URLS
========================= */
function buildIframeUrl(index) {
    const videoId = videoIds[currentLanguage]?.[index];
    if (!videoId) return "";
    
    return `https://drive.google.com/file/d/${videoId}/preview?autoplay=1`;
}

function buildDirectUrl(index) {
    const videoId = videoIds[currentLanguage]?.[index];
    if (!videoId) return "";
    // Attempt direct stream (may be blocked by Drive depending on permissions / size)
    return `https://drive.google.com/uc?export=download&id=${videoId}`;
}

function buildDriveViewUrl(index) {
    const videoId = videoIds[currentLanguage]?.[index];
    if (!videoId) return "";
    return `https://drive.google.com/file/d/${videoId}/view`;
}

/* =========================
   LOAD EPISODE
========================= */
function loadEpisode(index, autoplay = true) {
    activeIndex = index;

    const ep = episodes[index];

    if (!ep) return;

    episodeTitleEl.textContent = ep;

    const iframeUrl = buildIframeUrl(index);
    const directUrl = buildDirectUrl(index);
    const viewUrl = buildDriveViewUrl(index);

    if (!iframeUrl) {
        fallback.style.display = "block";
        player.src = "";
        playerDirect.removeAttribute("src");
        return;
    }

    // Prefer direct <video> first; if it errors, fall back to iframe preview.
    fallback.style.display = "none";
    externalLink.href = viewUrl || iframeUrl;

    // Reset both players to avoid audio overlap / stale loads
    player.src = "";
    playerDirect.pause();
    playerDirect.removeAttribute("src");
    playerDirect.load();

    if (directUrl) {
        playerDirect.style.display = "block";
        player.style.display = "none";
        playerDirect.src = directUrl;
        playerDirect.load();

        if (autoplay) {
            playerDirect.play().catch(() => {
                // Autoplay may be blocked; user can press play.
            });
        }
    } else {
        playerDirect.style.display = "none";
        player.style.display = "block";
        player.src = iframeUrl;
    }

    // If the direct stream fails (common with Drive), switch to iframe preview.
    playerDirect.onerror = () => {
        playerDirect.style.display = "none";
        player.style.display = "block";
        player.src = iframeUrl;
    };

    fallback.style.display = "none";

    updateUI();
}

/* =========================
   RENDER EPISODES
========================= */
function renderEpisodes() {
    listEl.innerHTML = episodes
        .map((ep, i) => `
            <button class="episode-card" data-index="${i}">
                ${ep}
                <span class="ep-num">EP ${i + 1}</span>
            </button>
        `)
        .join("");

    listEl.addEventListener("click", (e) => {
        const btn = e.target.closest(".episode-card");
        if (!btn) return;

        loadEpisode(Number(btn.dataset.index));
        markWatched(series.id);
    });
}

/* =========================
   UI ACTIVE STATE
========================= */
function updateUI() {
    document.querySelectorAll(".episode-card")
        .forEach((el, i) => {
            el.classList.toggle("active", i === activeIndex);
        });
    
    // Update episode counter
    const counter = document.getElementById("episodeCounter");
    counter.textContent = `${activeIndex + 1} / ${episodes.length}`;
    
    // Update button states
    const prevBtn = document.getElementById("prevButton");
    const nextBtn = document.getElementById("nextButton");
    prevBtn.disabled = activeIndex === 0;
    nextBtn.disabled = activeIndex === episodes.length - 1;
}

/* =========================
   NAVIGATION BUTTONS
========================= */
document.getElementById("prevButton").addEventListener("click", () => {
    if (activeIndex > 0) {
        loadEpisode(activeIndex - 1);
        markWatched(series.id);
    }
});

document.getElementById("nextButton").addEventListener("click", () => {
    if (activeIndex < episodes.length - 1) {
        loadEpisode(activeIndex + 1);
        markWatched(series.id);
    }
});

/* =========================
   CLICKABLE TITLE
========================= */
seriesTitleBtn.addEventListener("click", () => {
    window.location.href = seasonPageUrl;
});

/* =========================
   LANGUAGE SWITCHING
========================= */
languageSelect.addEventListener("change", (e) => {
    currentLanguage = e.target.value;
    loadEpisode(activeIndex, false);
});



/* =========================
   RECENT WATCHED
========================= */
function loadRecent() {
    try {
        return JSON.parse(localStorage.getItem("recentlyWatched")) || [];
    } catch {
        return [];
    }
}

function saveRecent(data) {
    localStorage.setItem("recentlyWatched", JSON.stringify(data));
}

function markWatched(id) {
    const recent = loadRecent().filter(r => r.id !== id);
    recent.unshift({ id, ts: Date.now() });
    saveRecent(recent.slice(0, 10));
}

/* =========================
   INIT
========================= */
renderEpisodes();
// check hash for initial episode (e.g. #ep=2)
function getEpisodeFromHash() {
    const h = location.hash.replace('#', '');
    if (!h) return null;
    try {
        const p = new URLSearchParams(h);
        const ep = p.get('ep');
        return ep !== null ? Number(ep) : null;
    } catch {
        return null;
    }
}

const initialEp = getEpisodeFromHash();
if (episodes.length > 0) {
    if (initialEp !== null && Number.isFinite(initialEp) && initialEp >= 0 && initialEp < episodes.length) {
        loadEpisode(initialEp, false);
    } else {
        loadEpisode(0, false);
    }
} else {
    episodeTitleEl.textContent = "No episodes found";
}

/* =========================
   OPTIONAL: ANI-LIST ENRICH
========================= */
(async () => {
    try {
        const data = series.anilistId
            ? await AniList.fetchById(series.anilistId)
            : await AniList.fetchByTitle(series.anilistTitle || series.title);
        if (!data) return;

        if (data.coverImage?.large) {
            seriesPosterEl.src = data.coverImage.large;
        }

        const enrichedTitle =
            data.title?.english ||
            data.title?.romaji ||
            displayName;
        seriesTitleBtn.textContent = enrichedTitle;
        seriesPosterEl.alt = enrichedTitle;

        if (data.siteUrl) {
            const a = document.createElement("a");
            a.href = data.siteUrl;
            a.target = "_blank";
            a.textContent = "AniList page";
            document.querySelector(".top-nav").appendChild(a);
        }
    } catch (e) {
        console.warn("AniList failed", e);
    }
})();

/* =========================
   AUTO MARK ON PLAY
========================= */
player.addEventListener("play", () => {
    markWatched(series.id);
});

playerDirect.addEventListener("play", () => {
    markWatched(series.id);
});
</script>

</body>
</html>
