<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Overview</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <a class="logo" href="index.html">Media DB</a>
        <nav class="top-nav"></nav>
    </div>
</header>

<main class="season-page">

    <section class="anime-hero anime-hero-full">
        <div class="anime-backdrop">
            <img id="animeBanner" src="" alt="banner">
        </div>

        <div class="anime-hero-inner">

            <div class="anime-poster">
                <img id="animeCover" src="" alt="cover">
            </div>

            <div class="anime-info">
                <h1 id="animeTitle">Loading...</h1>

                <div class="anime-meta" id="animeMeta"></div>

                <div class="anime-genres" id="animeGenres"></div>

                <p id="animeDescription">Loading description...</p>

                <div class="anime-actions">
                    <a href="index.html">← Library</a>
                    <a id="playerLink" href="#">▶ Watch</a>
                </div>
            </div>

        </div>
    </section>

    <div class="content season-content">
        <div class="season-body">
            <section class="panel season-episodes-panel">
                <h3>Episodes</h3>
                <div id="episodeList" class="episode-grid season-episode-grid"></div>
            </section>

            <aside class="panel season-related-panel">
                <h3>Related Series</h3>
                <div id="relatedSeriesList" class="related-series-list"></div>
            </aside>
        </div>
    </div>

</main>

<script src="js/series-db.js"></script>
<script src="js/anilist.js"></script>

<script>
function getSeriesId() {
    const u = new URL(window.location.href);
    return u.searchParams.get('id') || null;
}

const seriesId = getSeriesId() || 'call-of-the-night';
const series = getSeriesById(seriesId);

if (!series) throw new Error("Series not found: " + seriesId);

/* =========================
   ELEMENTS
========================= */
const coverEl = document.getElementById("animeCover");
const bannerEl = document.getElementById("animeBanner");
const titleEl = document.getElementById("animeTitle");
const metaEl = document.getElementById("animeMeta");
const genresEl = document.getElementById("animeGenres");
const descEl = document.getElementById("animeDescription");
const playerLink = document.getElementById("playerLink");
const episodeList = document.getElementById("episodeList");
const relatedSeriesList = document.getElementById("relatedSeriesList");

/* =========================
   BASE DATA (LOCAL FIRST)
========================= */
titleEl.textContent = series.title;
playerLink.href = `${series.playerPage}?id=${series.id}`;

if (series.cover) {
    coverEl.src = series.cover;
    bannerEl.src = series.cover;
    bannerEl.alt = `${series.subtitle || series.title} banner`;
}

/* =========================
   EPISODES (LOCAL CONTROL)
========================= */
episodeList.innerHTML = series.season.episodes.map((ep, i) => `
    <button class="episode-card" data-index="${i}">
        ${ep}
        <span class="ep-num">EP ${i + 1}</span>
    </button>
`).join('');

/* EVENT DELEGATION (better than querySelectorAll loop) */
    episodeList.addEventListener("click", (e) => {
    const btn = e.target.closest(".episode-card");
    if (!btn) return;

    const idx = btn.dataset.index;

    const recent = JSON.parse(localStorage.getItem("recentlyWatched") || "[]");
    const filtered = recent.filter(r => r.id !== series.id);
    
    filtered.unshift({ id: series.id, ts: Date.now() });
    localStorage.setItem("recentlyWatched", JSON.stringify(filtered.slice(0, 10)));

    window.location.href = `${series.playerPage}?id=${series.id}#ep=${idx}`;
});

/* =========================
   RELATED SERIES
========================= */
function renderRelatedSeries() {
    const related = getRelatedSeries(series.id);

    if (!related.length) {
        relatedSeriesList.innerHTML = `<p class="related-series-empty">No related series yet.</p>`;
        return;
    }

    relatedSeriesList.innerHTML = related.map(s => `
        <a class="related-series-card" data-series-id="${s.id}" href="${s.seasonPage}?id=${s.id}">
            <img src="${s.cover}" alt="${s.subtitle || s.title}">
            <div class="related-series-info">
                <strong>${s.subtitle || s.title}</strong>
                <span>${s.season.title} · ${s.season.episodeCount} eps</span>
                <span class="related-series-year">${s.year || ""}</span>
            </div>
        </a>
    `).join("");
}

async function enrichRelatedSeriesCovers() {
    const related = getRelatedSeries(series.id);
    for (const s of related) {
        try {
            const data = s.anilistId
                ? await AniList.fetchById(s.anilistId)
                : await AniList.fetchByTitle(s.anilistTitle || s.title);
            if (!data?.coverImage?.large) continue;

            const img = relatedSeriesList.querySelector(
                `.related-series-card[data-series-id="${s.id}"] img`
            );
            if (img) img.src = data.coverImage.large;
        } catch (err) {
            console.warn("Related AniList cover failed:", s.id, err);
        }
    }
}

renderRelatedSeries();
enrichRelatedSeriesCovers();

/* =========================
   ANILIST ENRICHMENT
========================= */
(async () => {
    try {
        const data = series.anilistId
            ? await AniList.fetchById(series.anilistId)
            : await AniList.fetchByTitle(series.anilistTitle || series.title);
        if (!data) return;

        // COVER
        if (data.coverImage?.large) {
            coverEl.src = data.coverImage.large;
        }

        // BANNER
        bannerEl.src = data.bannerImage || data.coverImage?.large || "";

        // TITLE (smart fallback)
        titleEl.textContent =
            data.title?.english ||
            data.title?.romaji ||
            series.title;

        // DESCRIPTION
        if (data.description) {
            descEl.innerHTML = AniList.cleanDescription(data.description);
        }

        // META (safe build)
        const meta = [
            data.season,
            data.seasonYear,
            data.episodes ? `${data.episodes} eps` : null,
            data.averageScore ? `★ ${data.averageScore / 10}` : null
        ].filter(Boolean);

        metaEl.textContent = meta.join(" • ");

        // GENRES (safe render)
        if (Array.isArray(data.genres)) {
            genresEl.innerHTML = data.genres
                .map(g => `<span>${g}</span>`)
                .join("");
        }

        // Add AniList link to header
        if (data.siteUrl) {
            const a = document.createElement("a");
            a.href = data.siteUrl;
            a.target = "_blank";
            a.textContent = "AniList page";
            document.querySelector(".top-nav").appendChild(a);
        }

    } catch (err) {
        console.warn("AniList fetch failed:", err);
    }
})();
</script>

</body>
</html>
